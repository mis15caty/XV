<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis 15 Caty</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
    }

    .subtituloI {
        font-family: 'Montserrat', sans-serif;
        color: #D4AF37;
        font-size: 8.5rem;
        text-transform: uppercase;
        letter-spacing: 5px;
        text-align: center;
        margin: 1.1rem;
        position: relative;
        z-index: 10;
    }

    .fechaI {
        font-family: 'Great Vibes', cursive;
        color: #FFFFFF;
        font-size: 8.5rem;
        line-height: 0.8;
        margin: 3.1rem;
        text-align: center;
        font-weight: 300;
        position: relative;
        z-index: 10;
    }
    
    /* Estilos para la Tarjeta de la Fecha */
    .tarjeta-fecha {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
        background-color: #A3B19B;
        padding: 20px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    /* Contenedor del texto para asegurar centrado */
    .texto-fecha {
        text-align: center;
        z-index: 2;
        width: 100%;
        max-width: 600px;
    }

    /* Estilos de los textos adaptables (Responsive) */
    .titulo-invitacion {
        font-family: 'Montserrat', sans-serif;
        color: #FFFFFF;
        font-size: 4.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 1.5rem;
        line-height: 1.4;
    }
    
    .titulo-invitacion1 {
        font-family: 'Montserrat', sans-serif;
        color: #FFFFFF;
        font-size: 3.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 1.5rem;
        line-height: 1.4;
    }

    .evento {
        font-family: 'Great Vibes', cursive;
        color: #ba9a30;
        font-size: 8rem;
        font-weight: 700;
        letter-spacing: 4px;
        margin: 0 0 1rem 0;
    }

    /* Configuración de la sección principal */
    .tarjeta-responsive-full {
        background-image: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url('https://i.postimg.cc/y62KhV66/fondo2.jpg');
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: center center;
        height: 100vh; 
        width: 100vw;  
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        position: relative;
        box-sizing: border-box;
    }

    .tarjeta-responsive-full::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.35);
        z-index: 1;
    }

    /* ==========================================
       ESTILOS PARA LAS LUCIÉRNAGAS (Animación)
       ========================================== */
    .luciernagas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .firefly {
        position: absolute;
        width: 6px;
        height: 6px;
        background-color: #FFFDD0;
        border-radius: 50%;
        box-shadow: 0 0 10px #D4AF37, 0 0 20px #D4AF37;
        animation: flotar infinite ease-in-out;
    }

    @keyframes flotar {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
        50% { transform: translateY(-40px) scale(1.5); opacity: 1; }
    }

    /* ==========================================
       ESTILOS PARA LA TARJETA CONTADOR
       ========================================== */
    .tarjeta-contador {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('https://i.postimg.cc/C1zxRyFj/Whats-App-Image-2026-06-23-at-22-35-57-(1).jpg');
        background-size: cover;       
        background-position: center;  
        background-repeat: no-repeat; 
        padding: 20px;
        box-sizing: border-box;
        text-align: center;
    }

    .tarjeta-contador .fecha {
        font-family: 'Great Vibes', cursive;
        color: #FFFFFF;
        font-size: 12rem; 
        margin: 0 0 1rem 0;
        line-height: 1;
        -webkit-text-stroke: 1px #FFFFFF;
        margin-bottom: 4rem;
        font-weight: 300;
    }

    .cuenta-regresiva {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 15px; 
        text-align: center;
    }

    .bloque-tiempo {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .numero {
        font-size: 4.5rem; 
        font-weight: bold;
        color: #ffffff; 
        line-height: 1;
    }

    .etiqueta {
        font-size: 2rem;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 8px;
        letter-spacing: 1px;
    }

    .separador {
        font-size: 4.5rem;
        font-weight: bold;
        color: #ffffff;
        line-height: 1;
        padding-top: 2px;
    }

    .marco {
        background-color: rgba(255, 255, 255, 0.2);
        padding: 60px 60px;
        border-radius: 15px;
        display: inline-block;
        backdrop-filter: blur(5px);
    }

    /* Ajuste para celulares */
    @media (max-width: 480px) {
        .cuenta-regresiva { gap: 10px; }
        .numero { font-size: 2rem; }
        .etiqueta { font-size: 0.75rem; }
    }

    /* ==========================================
       ESTILOS PARA LA TARJETA LUGAR
       ========================================== */
    .tarjeta-lugar {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
        background-color: #98AC9F;
        padding: 30px 20px;
        box-sizing: border-box;
        text-align: center;
    }

    .etiqueta-lugar {
        font-family: 'Great Vibes', cursive;
        color: #FFFFFF;
        font-size: 6rem;
        margin: 0 0 1rem 0;
        line-height: 1;
        -webkit-text-stroke: 1px #FFFFFF;
    }

    .nombre-salon {
        font-family: 'Montserrat', sans-serif;
        color: #FFFFFF;
        font-size: 4.2rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        line-height: 1.3;
        margin: 0 0 1.5rem 0;
        max-width: 90%;
    }

    .ubicacion {
        font-family: 'Montserrat', sans-serif;
        color: #2A523B;
        font-size: 5rem;
        font-weight: 300;
        letter-spacing: 4px;
        margin: 0 0 2.5rem 0;
    }

    .tarjeta-lugar a {
        color: #D4AF37 !important;
        font-size: 4.5rem !important;
        margin-top: 20px;
        display: inline-block;
        transition: transform 0.3s ease, color 0.3s ease;
        background-color: rgba(255, 255, 255, 0.15);
        padding: 35px 42px;
        border-radius: 50%;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .tarjeta-lugar a:hover {
        transform: scale(1.15);
        color: #FFFFFF !important;
        background-color: rgba(214, 175, 55, 0.3);
    }

    /* ==========================================
       ESTILOS PARA LA TARJETA PLAYLIST
       ========================================== */
    .tarjeta-playlist {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        min-height: 100vh;
        width: 100%;
        background-image: linear-gradient(rgba(0, 0, 0, 0.60), rgba(0, 0, 0, 0.60)), url('https://i.postimg.cc/c1zd55sn/playlist.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        padding: 30px 20px;
        box-sizing: border-box;
        text-align: center;
    }

    .contenido-playlist {
        width: 100%;
        max-width: 550px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 100px;
    }

    .titulo-playlist {
        font-family: 'Great Vibes', cursive;
        color: #FFFFFF;
        font-size: 6rem;
        margin: 0 0 1rem 0;
        line-height: 1;
        font-weight: 100;
    }

    .frase-playlist {
        font-family: 'Montserrat', sans-serif;
        color: #FFFFFF;
        font-size: 1.8rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0 0 3.5rem 0;
        line-height: 1.4;
        font-weight: 300;
    }

    .btn-playlist {
        margin-top: 20px;
        font-family: 'Montserrat', sans-serif;
        color: #D4AF37 !important;
        background-color: rgba(255, 255, 255, 0.08);
        font-size: 2.5rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-decoration: none;
        padding: 28px 35px;
        border: 2px solid #D4AF37;
        border-radius: 50px;
        transition: all 0.3s ease;
    }

    .btn-playlist:hover {
        color: #000000 !important;
        background-color: #D4AF37;
        transform: translateY(-4px);
        box-shadow: 0 8px 25px rgba(214, 175, 55, 0.4);
    }

    /* ==========================================
       ESTILOS PARA LA TARJETA DRESS CODE
       ========================================== */
    .tarjeta-dresscode {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .capa-titulo-dresscode {
        position: absolute;
        top: 10%;
        z-index: 10;
        text-align: center;
        width: 90%;
        max-width: 500px;
        background-color: rgba(255, 255, 255, 0.2);
        padding: 15px 25px;
        border-radius: 15px;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .capa-titulo-dresscode h2 {
        font-family: 'Montserrat', sans-serif;
        color: #FFFFFF;
        font-size: 1.8rem;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin: 0;
    }

    .resalte-elegante {
        font-family: 'Montserrat', sans-serif;
        color: #FFFFFF;
        font-size: 3.5rem;
        text-transform: none;
        letter-spacing: 0;
        display: block;
        margin-top: 5px;
        -webkit-text-stroke: 0.5px #D4AF37;
    }

    .carrusel-contenedor {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
    }

    /* ==========================================
       Media Queries para pantallas grandes (PC)
       ========================================== */
    @media (min-width: 768px) {
        .titulo-invitacion { font-size: 4rem; }
        .evento { font-size: 4.8rem; }
        .tarjeta-contador .fecha { font-size: 12rem; }
        .etiqueta-lugar { font-size: 8rem; }
        .nombre-salon { font-size: 3.5rem; letter-spacing: 5px; }
        .ubicacion { font-size: 5.5rem; }
        .capa-titulo-dresscode h2 { font-size: 2.2rem; }
        .resalte-elegante { font-size: 4.5rem; display: inline; margin-left: 10px; }
        .capa-titulo-dresscode { max-width: 700px; padding: 20px 40px; top: 12%; }
        .titulo-playlist { font-size: 9.5rem; }
        .frase-playlist { font-size: 2.2rem; }
        .btn-playlist { font-size: 1.4rem; padding: 20px 45px; }
    }
    </style>
  </head>

  <body>

    <section class="tarjeta-responsive-full">
        <div class="subtituloI">Mis XV</div>
        <h1 class="fechaI">Catalina</h1>   
    </section>

    <section class="tarjeta-fecha">
      <div class="luciernagas-container">
        <script>
          for(let i=0; i<40; i++) {
            document.write(`<div class="firefly" style="top: ${Math.random()*100}%; left: ${Math.random()*100}%; animation-duration: ${5 + Math.random()*10}s;"></div>`);
          }
        </script>
      </div>

      <div class="texto-fecha">
        <p class="titulo-invitacion">Te invito </p>
        <p class="titulo-invitacion">a celebrar </p>
        <p class="titulo-invitacion">mis quince</p>
        <p class="evento"> ~ Sábado ~</p>
        <p class="titulo-invitacion1">17 de octubre de 2026</p>
      </div>
    </section>

    <section class="tarjeta-contador">
      <div class="marco">  
        <p class="fecha">Faltan</p>
        <div class="cuenta-regresiva">
            <div class="bloque-tiempo">
                <span id="dias" class="numero">00</span>
                <span class="etiqueta">Días</span>
            </div>
            
            <div class="separador">:</div>

            <div class="bloque-tiempo">
                <span id="horas" class="numero">00</span>
                <span class="etiqueta">Hs</span>
            </div>
            
            <div class="separador">:</div>

            <div class="bloque-tiempo">
                <span id="minutos" class="numero">00</span>
                <span class="etiqueta">Min</span>
            </div>
            
            <div class="separador">:</div>

            <div class="bloque-tiempo">
                <span id="segundos" class="numero">00</span>
                <span class="etiqueta">Seg</span>
            </div>
        </div>
      </div>
    </section>

    <section class="tarjeta-lugar">
        <p class="etiqueta-lugar">Lugar</p>
        <p class="nombre-salon">Salón de la Cooperativa de Monte Cristo </p>
        <p class="ubicacion">21.00 horas</p>
        <a href="https://maps.app.goo.gl/S8aYkjZUzFG6ZqDV6" target="_blank">
            <i class="fa-solid fa-location-dot"></i>
        </a>
    </section>
    
    <section class="tarjeta-playlist">
        <div class="contenido-playlist">
            <h2 class="titulo-playlist">Playlist</h2>
            <p class="frase-playlist">¿Qué canción no puede faltar?</p>
            
            <div class="form-busqueda">
                <button type="button" id="btn-abrir-playlist" class="btn-playlist">Agregar Canción</button>
            </div>
        </div>
    </section>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const botonAbrir = document.getElementById('btn-abrir-playlist');
        const urlGoogleForm = "https://docs.google.com/forms/d/e/1FAIpQLSc07-fjfWCzl4Kdb3WLG-MLhdHZsO5xrn4kmNh_PG3g8FCVgg/viewform?usp=sharing";

        if (botonAbrir) {
            botonAbrir.addEventListener('click', function() {
                window.open(urlGoogleForm, '_blank');
            });
        }
    });
    </script>

    <section class="tarjeta-dresscode">
        <div class="capa-titulo-dresscode">
           <h2>Dress Code: <span class="resalte-elegante">Elegante</span></h2>
        </div>
        <div class="carrusel-contenedor"></div>
    </section>

  </body>
</html>
